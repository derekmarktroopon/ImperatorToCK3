l_english:
 convert_to_camunic_event.1:0 "Results of Analysis"
 convert_to_camunic_event.1_desc:0 "The ancient runes have withheld this precious knowledge since thousands of years ago.\nThanks to this discovery, we will be able to return to the glorious ways of the past, and restore Camunia to its ancient glory."
 convert_to_camunic_event.1_option.1:0 "This will make us stronger!"
 form_the_kingdom_of_camunia_event.t:0 "Form the Kingdom of Camunia"
 form_the_kingdom_of_camunia_event.desc:0 "Since 9000 years ago, the Camunians have ruled over this land.\nAfter the Roman conquest, our civilization was almost completely wiped from existance, until now."  
 form_the_kingdom_of_camunia_event_option.1:0 "Long live Camunia!"
 form_the_empire_of_camunia_event.t:0 "Form the Empire of Camunia"
 form_the_empire_of_camunia_event.desc:0 "Through the guidance of the Rosa Camuna, we have seen only victory after victory.\nThrough these new lands, we shall forge an Empire, stronger than any before and everafter."
 form_the_empire_of_camunia_event_option.1:0 "All Hail the Emperor!"
 reform_camunism_faith_event.t:0 "The Camunic Reform"
 reform_camunism_faith_event.desc:0 "All the Rose Disciples have gathered together with the Emperor of Camunia.\nA long discussion has ensued, to come up with the guidelines for the Camunic religion in the years to come.\nWith the faithful united under a Reitia's Incarnate, Camunists have secured themselves a future in the ages."
 reform_camunism_faith_event_option.1:0 "Glory to the Rosa Camuna!"
 battleaxe_of_ariald_event.9:0 "The Battleaxe of Ariald"
 battleaxe_of_ariald_event.9_desc:0 "Following my legendary quest, i have come into possession of an artifact that was long lost. \nNone other than the Battleaxe of Ariald, the magical weapon that brought victory to our King so much time ago."
 battleaxe_of_ariald_event.9_option.1:0 "Neat"
 battleaxe_of_ariald_artifact:0 "Battleaxe of Ariald"
 battleaxe_of_ariald_artifact_desc:0 "Created by the legendary King of the Camunians Ariald, this Battleaxe has proved its worth and is said to possess magical abilities"
 camunic_opinion:0 "Camunic Opinion"