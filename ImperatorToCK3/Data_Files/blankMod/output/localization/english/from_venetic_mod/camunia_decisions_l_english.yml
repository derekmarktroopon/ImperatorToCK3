l_english:
 analyze_ancient_runes:0 "Analyze ancient Runes"
 analyze_ancient_runes_desc:0 "The inscriptions in the stone of the Valle Camonica may share with us their ancient knowledge"
 analyze_ancient_runes_tooltip:0 "Analyze ancient Runes"
 analyze_ancient_runes_confirm:0 "Let's get to analyzing"
 form_the_kingdom_of_camunia_decision:0 "Form the Kingdom of Camunia"
 form_the_kingdom_of_camunia_decision_desc:0 "We have finally managed to gather our ancient lands back in one realm. \n Now, it's time for us to become independent and rule over Camunia!"
 form_the_kingdom_of_camunia_decision_confirm:0 "It is finally time."
 form_the_kingdom_of_camunia_decision_tooltip:0 "Unite the lands of Camunia"
 form_the_empire_of_camunia_decision:0 "Form the Empire of Camunia"
 form_the_empire_of_camunia_decision_desc:0 "Following the devastating defeats we inflicted to our enemies in the kingdoms of Venice, Italy and Bavaria, i now control such titles that i am no longer worthy of the title of King, but Emperor.\nBy uniting those kingdoms under one, imperial, crown, with the approval of the Rosa Camuna, we will rule the lands rightfully."
 form_the_empire_of_camunia_decision_confirm:0 "Nothing holds us back now"
 form_the_empire_of_camunia_decision_tooltip:0 "Forge the Greatest Empire"
 reform_camunism_faith_decision:0 "Reform the Camunic Faith"
 reform_camunism_faith_decision_desc:0 "Now that we have acquired large territory in Europe, it is essential for us to organize our Faith.\nBy calling in all of our Rose Disciples, we shall establish the new doctrines of the True Camunic Faith."
 reform_camunism_faith_decision_tooltip:0 "Reform the Camunic Faith"
 reform_camunism_faith_decision_confirm:0 "Praise the Rosa Camuna!"