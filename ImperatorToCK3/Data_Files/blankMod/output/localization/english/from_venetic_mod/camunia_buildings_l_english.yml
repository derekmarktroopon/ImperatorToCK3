 building_type_ruins_of_minerva_temple:0 "Ruins of the Minerva Temple"
 building_ruins_of_minerva_temple:0 "Ruins of Minerva Temple"
 building_ruins_of_minerva_temple_desc:0 "The temple was built in the 1st century BC by will of Gnaeus Caesius and Titus Caesius Priscus.\nOf the ancient temple, the façade has been preserved, with six Corinthian columns supporting the architrave and a small pediment.\nToday, the Temple is visited by Camunics and Hellenists alike."
 building_rosa_camuna_temple:0 "Temple of the Rosa Camuna"
 building_rosa_camuna_temple_desc:0 "Following the restauration and renovation of the Minerva Temple, the now Rosa Camuna Temple is the principal pilgrim destination for Camunics.\nMuch greater than before, it houses people, members of the clergy, and hosts frequent rituals."
