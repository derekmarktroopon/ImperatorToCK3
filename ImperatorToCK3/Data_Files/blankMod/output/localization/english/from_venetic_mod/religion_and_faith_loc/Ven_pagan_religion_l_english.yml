l_english:

 retic_religion: "Cisalpine"
 retic_religion_adj: "Cisalpine"
 retic_religion_desc: "The Ancient Religions of the Cisalpine Gaulish lands vary greatly in practice and deities. From the Reitia worshipping Italic Venetians, to the Pre-Indo-European Raeti. Though religious syncrenism is common amongst the Cisalpine peoples."

 #Reitian Paganism"
 venetic_paganism:0 "Venetism"
 venetic_paganism_adj:0 "Venetist"
 venetic_paganism_adherent:0 "Venetist"
 venetic_paganism_adherent_plural:0 "Venetists"
 venetic_paganism_desc:0 "Before the arrival of the Romans, the religion followed across the northeast of the Italian peninstula, from the coast of the Adriatic, to the Alpine mountains, was a polytheistic religion that shared many deities and practices with the faiths of the nearby Celts and Illyrians. Notable local deities include Trimusiate, Altino and Enaios. However few were as reveared as the goddess Reitia."
 venetic_paganism_old:0 "Old Venetism"
 venetic_paganism_old_adj:0 "Old Venetist"
 venetic_paganism_old_adherent:0 "Venetic Pagan"
 venetic_paganism_old_adherent_plural:0 "Venetic Pagans"

 cult_of_reitia_paganism:0 "Cult of Reitia"
 cult_of_reitia_paganism_adj:0 "Reitianic"
 cult_of_reitia_paganism_adherent_adj:0 "Reitianist"
 cult_of_reitia_paganism_adherent_plural:0 "Reitianists"
 cult_of_reitia_paganism_desc:0 "The temple of Reitia in Este attracted pilgrims from across the Veneti area, with Illyrians, Celts and even Romans having traveled to pay respect to the goddess. With such unmatched regional reverance compared to other gods from around Venetia, most of which were local deities, it's clear that the cult of Reitia was distinguished in it's scope. In this it may be said that reverance to Reitia was supreme amongst the gods of the Veneti."
 cult_of_reitia_paganism_old:0 "Old Following of Reitia"
 cult_of_reitia_paganism_old_adj:0 "Old Reitianic"
 cult_of_reitia_paganism_old_adherent_adj:0 "Old Reitianist"
 cult_of_reitia_paganism_old_adherent_plural:0 "Old Reitianists"

 raetic_pagan:0 "Raetism"
 raetic_pagan_adj:0 "Raetic"
 raetic_pagan_adherent:0 "Raetist"
 raetic_pagan_adherent_plural:0 "Raetists"
 raetic_pagan_desc:0 "For thousands of years, untill the Romans arrived to conquer them, the Raetians followed a polytheistic belief system. Though little else is known of their faith, votive offerings to the ancient Raetic Gods were widespread."
 raetic_pagan_old:0 "Old Raetism"
 raetic_pagan_old_adj:0 "Old Raetic"
 raetic_pagan_old_adherent:0 "Old Raetist"
 raetic_pagan_old_adherent_plural:0 "Old Raetists"
 
 tenet_ritual_writing_name:0 "Votive Inscriptions"
 tenet_ritual_writing_desc:0 "This faith believes that messages to the gods must be imortalized through inscriptions, and that the priest class must be responsible for the passing down of literacy necessary for this to be done."
 tenet_ritual_writing_active:0 "The faithful may occasionaly make written offerings to the gods, giving bonuses."
 tenet_venetic_deities_name:0 "Deivos"
 tenet_venetic_deities_desc:0 "Localities, following this faith, tend to favour local patron gods, building local centres of worship for their respective patron. However, they are rare to shun gods of other regions, and regularly make pigramages to temples of the other Deivobos as well."
 tenet_venetic_deities_active:0 "Adherents may select personal deities."
 tenet_cult_of_reitia_name:0 "Priesthood of Reitia"
 tenet_cult_of_reitia_desc:0 "Whilst the peoples of Cisalpine Gaul have long held traditions of ritual scripture, this is most pronounced amongst those who follow the goddess Reitia. Associated with knowledge and writing, the faithful are divinely encouraged to be practiced in literacy and the priesthood have a duty to safeguard and educate their flock in the ways of writting scripture."
 
 venetic_hellenic_syncrenism_name:0 "Venetist Syncrenism"
 venetic_hellenic_syncrenism_desc:0 "To survive in an ever-changing world, Venetists have had to work hard to adapt their views of other faiths, and the views of those hostile to theirs, acording to the situation they found themselves in. From the Etruscans to the Celts and Latins, it has always been imperative for Venetists to make others feel like they are one of their own, while still striving to retain their own traditions (even if they ended up loosing their faith to the agressive Romans this way)."
 