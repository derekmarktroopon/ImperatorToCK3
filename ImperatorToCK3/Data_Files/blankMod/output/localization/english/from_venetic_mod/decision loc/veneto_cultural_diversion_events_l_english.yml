l_english:

  emergence_of_the_venetians_decision: "Emergence of the Venetians"
  emergence_of_the_venetians_decision_desc: "In the centuries falling the collapse of the Roman Empire, our brethren have clung onto the edge of life as we were subject to foreign invasions and raids. Now however, we can sense the winds of change, and once again take to those sea routes that brought our ancestors wealth long ago..."

  venetkens_of_germania_decision: "The Venetkens of Germania"
  venetkens_of_germania_decision_desc: "In this remote land, far from the plains of Venetia, we can hardly pretend that we run the same lives as those of our ancestors. Isolated from our past, we must turn to our neighbours so that we may look forwards, and adopt the germanic ways so that our people may persevere in this cold land."

  divergence_of_the_winitkens_decision: "Winitkens in the Isles"
  divergence_of_the_winitkens_decision_desc: "These Brittanic lands are rich with fertile plains, and what's more, ripe for the picking as they fail to hold back the migration of our germanic neighbours. We ought not to get left out, especially with the opportunity to obtaind such bountiful land as our ancestors are said to have possessed."

  future_of_the_wintcins_decision: "Future of the Wincins"
  future_of_the_wintcins_decision_desc: "Times are changing, and the lands that our ancestors long ago came to call their home has come under the yolk of foreign invaders. In these uncertain times, we must change the way we think, act and speak, accordingly."

  the_wyntish_people_decision: "The Wyntish People"
  the_wyntish_people_decision_desc: "These days are a time of innovation, trade and chivalry. Tales tell of heroes off on pilgimages acting with unmatched valour and bravery, and poems speak of far off holy men, monks and fair maidens, spreading the will of our lord. We must embrace these new societal changes, and lead our people into a new age."