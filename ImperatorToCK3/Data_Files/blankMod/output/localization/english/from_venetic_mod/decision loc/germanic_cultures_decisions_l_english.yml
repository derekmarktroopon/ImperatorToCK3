l_english:
 unite_anglosaxon_cultures_decision: "Unite the Anglo-Saxons"
 unite_anglosaxon_cultures_decision_tooltip: "Unite the people of England into a single culture"
 unite_anglosaxon_cultures_decision_desc: "While Bretwaldas have many a time established hegemony over competing Anglo-Saxons kingdoms, never before have our peoples truly seemed unified. With foreign incursions against our island however, it is only through banding together that we may drive out these threats."
 unite_anglosaxon_cultures.preview.tt: "The various West Germanic cultures inhabiting the British Isles will unite and become Anglo-Saxon."
 unite_anglosaxon_cultures_confirm: "For a unified England!"
 
